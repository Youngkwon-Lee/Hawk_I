name: Build Qwen VL Server Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/runpod/qwen_vl_openai_server.py"
      - "scripts/runpod/requirements-qwen-vl-server.txt"
      - "scripts/runpod/Dockerfile.qwen-vl-server"
      - ".github/workflows/build-qwen-vl-server-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/hawkeye-qwen-vl-server
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/runpod/Dockerfile.qwen-vl-server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

