experiment:
  name: qwen_vl_lora_motorexam_observation_only_v0_1
  stage: phase_1_observation_only
  objective: structured_json_sft

model:
  base_model: Qwen/Qwen2.5-VL-7B-Instruct
  adaptation: lora
  quantization: 4bit
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj

data:
  train_jsonl: experiments/data/motorexam_qwen_sft_small_train_v0_1.jsonl
  val_jsonl: experiments/data/motorexam_qwen_sft_small_val_v0_1.jsonl
  allow_missing_videos_as_blank_images: true
  tasks:
    - gait
    - finger_tapping
  question_types:
    - observation
  fields:
    input_type: sampled_frames
    output_type: structured_json
  sampling_policy:
    gait: 8
    finger_tapping: 8
  split_policy:
    train: silver
    val: gold

training:
  epochs: 5
  micro_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_seq_length: 4096
  bf16: true
  gradient_checkpointing: true

evaluation:
  primary_metrics:
    - json_valid_rate
    - cue_agreement
  secondary_metrics:
    - qwk
    - mae

notes:
  - Observation-only experiment to prioritize binary presence/absence detection.
  - Current small train split contains gait observation examples only.
